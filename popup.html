<!DOCTYPE html>
<html>
<head>
  <title>Quiet Apply</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header">
    <h1>Quiet Apply</h1>
    <p>Apply smarter, not louder.</p>
  </div>

  <button id="extractBtn">Extract Job Description</button>
  <p id="extractStatus" class="statusText"></p>

  <label for="jobText">Job Description</label>
  <textarea id="jobText" placeholder="Open a job posting and click Extract Job Description"></textarea>

  <div class="resumeHeader">
    <label for="resumeText">Your Resume / Profile</label>
    <div>
      <button id="saveProfileBtn" class="smallBtn">Save</button>
      <button id="clearProfileBtn" class="smallBtn dangerBtn">Clear</button>
    </div>
  </div>

  <p id="profileStatus" class="statusText">No saved profile yet.</p>
  <textarea id="resumeText" placeholder="Paste your resume or professional profile once and save it"></textarea>

  <button id="generateBtn">Generate Analysis</button>
  <p id="analysisStatus" class="statusText"></p>

  <div id="results" class="results hidden">
    <h2>Application Analysis</h2>

    <div class="scoreBox">
      <span>Match Score</span>
      <strong id="matchScore">0%</strong>
    </div>

    <h3>Missing Skills</h3>
    <ul id="missingSkills"></ul>

    <h3>Resume Suggestions</h3>
    <ul id="resumeSuggestions"></ul>

    <div class="sectionHeader">
      <h3>Cover Letter Draft</h3>
      <button id="copyCoverLetterBtn" class="smallBtn">Copy</button>
    </div>
    <textarea id="coverLetter" readonly></textarea>
  </div>

  <script src="popup.js"></script>

</body>
</html>
